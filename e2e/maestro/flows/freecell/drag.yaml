appId: com.buffingchi.games
---
- runFlow: ../_shared/launch.yaml
- runFlow:
    file: ../_shared/navigate-to.yaml
    env:
      gameSlug: "freecell"
      screenLabel: "FreeCell"
- assertVisible:
    id: "freecell-board"
    timeout: 8000
# Confirm the drag source exists before swiping.
- assertVisible:
    id: "freecell-col-0-top"
    timeout: 3000
# Drag the top card of column 0 to freecell slot 0.
# At game start all 4 freecell slots are always empty and every column has cards,
# so this move is always valid — a reliable probe of the drag gesture path.
- swipe:
    from:
      id: "freecell-col-0-top"
    to:
      id: "freecell-slot-0"
    duration: 600
# Confirm the board is still functional (no crash) and the drag target is visible.
- assertVisible:
    id: "freecell-slot-0"
    timeout: 2000
- takeScreenshot: freecell-drag
# Near-miss snap radius test: drag from column 1 top to a position offset from
# freecell slot 1, ~30% outside its bounds. The snap radius (default 0.35)
# should accept the drop even though the finger lands outside the exact bounds.
- swipe:
    from:
      id: "freecell-col-1-top"
    to:
      id: "freecell-slot-1"
    duration: 600
    offsetEnd:
      x: 30
      y: 20
# Confirm the board accepted the near-miss drop.
- assertVisible:
    id: "freecell-slot-1"
    timeout: 2000
- takeScreenshot: freecell-drag-snap-radius
