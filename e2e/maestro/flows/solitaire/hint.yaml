appId: com.buffingchi.games
---
- runFlow: ../_shared/launch.yaml
- runFlow:
    file: ../_shared/navigate-to.yaml
    env:
      gameSlug: "solitaire"
      screenLabel: "Solitaire"
- assertVisible:
    id: "solitaire-hint-button"
    timeout: 8000
- tapOn:
    id: "solitaire-hint-button"
- takeScreenshot: solitaire-hint
