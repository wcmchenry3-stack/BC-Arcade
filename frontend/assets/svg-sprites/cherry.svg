<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main body: warm red, bright upper-left, dark lower-right -->
    <radialGradient id="body" cx="37%" cy="30%" r="68%" fx="37%" fy="30%">
      <stop offset="0%"   stop-color="#f25c6e"/>
      <stop offset="35%"  stop-color="#c8192d"/>
      <stop offset="75%"  stop-color="#9a0d1f"/>
      <stop offset="100%" stop-color="#6b0010"/>
    </radialGradient>
    <!-- Rim shadow: subtle dark ring at edge -->
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.32)"/>
    </radialGradient>
    <!-- Primary specular highlight -->
    <radialGradient id="spec1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.90)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Secondary smaller specular -->
    <radialGradient id="spec2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.70)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- ── Body ── -->
  <circle cx="256" cy="256" r="210" fill="url(#body)"/>
  <circle cx="256" cy="256" r="210" fill="url(#rim)"/>

  <!-- ── Specular highlights ── -->
  <!-- Large soft highlight, upper-left -->
  <ellipse cx="183" cy="168" rx="66" ry="46"
           transform="rotate(-28 183 168)"
           fill="url(#spec1)"/>
  <!-- Small crisp glint -->
  <ellipse cx="160" cy="192" rx="22" ry="14"
           transform="rotate(-28 160 192)"
           fill="url(#spec2)" opacity="0.65"/>

  <!-- ── Top dimple (characteristic cherry nub) ── -->
  <ellipse cx="256" cy="52" rx="18" ry="11"
           fill="rgba(80,0,10,0.40)"/>

  <!-- ── Face ── -->
  <!-- Left eye -->
  <circle cx="210" cy="286" r="22" fill="#2a0e00"/>
  <circle cx="217" cy="278" r="8"  fill="white"/>
  <!-- Right eye -->
  <circle cx="302" cy="286" r="22" fill="#2a0e00"/>
  <circle cx="309" cy="278" r="8"  fill="white"/>
  <!-- Smile -->
  <path d="M 220 322 Q 256 352 292 322"
        stroke="#2a0e00" stroke-width="9"
        fill="none" stroke-linecap="round"/>
</svg>
