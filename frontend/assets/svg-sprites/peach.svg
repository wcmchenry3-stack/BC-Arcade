  <ellipse cx="324" cy="310" rx="30" ry="18" fill="rgba(253,186,116,0.48)"/>
  <circle cx="210" cy="286" r="22" fill="#2a0e00"/>
  <circle cx="217" cy="278" r="8" fill="white"/>
  <circle cx="302" cy="286" r="22" fill="#2a0e00"/>
  <circle cx="309" cy="278" r="8" fill="white"/>
  <path d="M 220 322 Q 256 352 292 322" stroke="#2a0e00" stroke-width="9" fill="none" stroke-linecap="round"/>
