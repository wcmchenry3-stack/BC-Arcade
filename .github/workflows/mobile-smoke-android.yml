name: Mobile Smoke — Android

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mobile-smoke-android
  cancel-in-progress: false

jobs:
  maestro-android:
    name: Maestro Android smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install JS dependencies
        run: npm ci
        working-directory: frontend

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.13
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: https://gaming-app-api-dev.onrender.com

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install frontend/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test \
              --output ./maestro-results \
              $(find e2e/maestro/flows -name "*.yaml" ! -path "*/_shared/*")

      - name: Write job summary
        if: always()
        shell: python3 {0}
        run: |
          import xml.etree.ElementTree as ET, os
          report = 'maestro-results/report.xml'
          out = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          rows = []
          try:
              root = ET.parse(report).getroot()
              suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
              for s in suites:
                  name = s.get('name', 'unknown').removeprefix('e2e/maestro/flows/').removesuffix('.yaml')
                  failed = int(s.get('failures', 0)) + int(s.get('errors', 0))
                  rows.append(f'| `{name}` | {"❌ FAIL" if failed else "✅ PASS"} |\n')
          except FileNotFoundError:
              rows.append('| _(no report — test runner may have crashed)_ | — |\n')
          except ET.ParseError as exc:
              rows.append(f'| _(parse error: {exc})_ | — |\n')
          with open(out, 'a') as f:
              f.write('## Maestro Android Smoke\n\n| Flow | Result |\n|---|---|\n')
              f.writelines(rows)

      - name: Upload Maestro results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: maestro-android-results
          path: |
            maestro-results/
            ~/.maestro/tests/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: maestro-android-screenshots
          path: |
            screenshots/
            maestro-results/screenshots/
          if-no-files-found: ignore
          retention-days: 7
