name: Mobile Smoke — Android

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mobile-smoke-android
  cancel-in-progress: false

jobs:
  maestro-android:
    name: Maestro Android smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install JS dependencies
        run: npm ci
        working-directory: frontend

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.13
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: https://gaming-app-api-dev.onrender.com

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install frontend/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test \
              --output ./maestro-results \
              $(find e2e/maestro/flows -name "*.yaml" ! -path "*/_shared/*")

      - name: Upload Maestro artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: maestro-android-results
          path: |
            maestro-results/
            ~/.maestro/tests/
          if-no-files-found: warn
          retention-days: 7
