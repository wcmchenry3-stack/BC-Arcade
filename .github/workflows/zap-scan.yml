name: ZAP Weekly Scan

on:
  schedule:
    # Weekly Sunday at 06:00 UTC (midnight Mountain Time)
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-api:
    name: DAST — API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          target: https://dev-games-api.buffingchi.com
          artifact_name: zap-weekly-gaming-api
          allow_issue_writing: false
          token: ${{ secrets.GITHUB_TOKEN }}

  zap-frontend:
    name: DAST — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          target: https://dev-games.buffingchi.com
          artifact_name: zap-weekly-gaming-frontend
          allow_issue_writing: false
          token: ${{ secrets.GITHUB_TOKEN }}
